workflows:
  ios-distribution:
    name: iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app-stuff
      vars:
        BUNDLE_ID: com.aust.umzuege
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build depth-capture plugin
        script: cd plugins/capacitor-depth-capture && npx tsc

      - name: Build web app
        script: npm run build

      - name: Capacitor — add & sync iOS
        script: |
          npx cap add ios
          npx cap sync ios

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Diese App benötigt Zugriff auf die Kamera, um Fotos Ihrer Möbel für die Umzugsplanung aufzunehmen.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Diese App benötigt Zugriff auf Ihre Fotos, um Bilder für die Umzugsplanung hochzuladen.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Diese App speichert aufgenommene Fotos in Ihrer Fotobibliothek.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Diese App benötigt Zugriff auf das Mikrofon für die Videoaufnahme.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(date +%s)

      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILES_HOME/aust.mobileprovision"
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-build:
    name: Android — APK
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      groups:
        - app-stuff
      node: 22
      java: 17

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor — add & sync Android
        script: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        script: cd android && ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
